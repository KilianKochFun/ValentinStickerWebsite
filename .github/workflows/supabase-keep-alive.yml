name: Supabase Keep-Alive
# Supabase Free pausiert ein Projekt nach ~1 Woche Inaktivität.
# Dieser Ping ruft zweimal pro Woche den Auth-Health-Endpoint.

on:
  schedule:
    - cron: '0 6 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          URL="${SUPABASE_URL%/}"
          echo "URL-Länge: ${#URL}  (soll ~https://<ref>.supabase.co = ca. 40)"
          echo "Endet mit: ...${URL: -20}"
          echo
          echo "--- Ping /rest/v1/stickers ---"
          curl -v \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$URL/rest/v1/stickers?select=id&limit=1"
          echo
          echo "--- Ping /rest/v1/ (root) ---"
          curl -v \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$URL/rest/v1/"

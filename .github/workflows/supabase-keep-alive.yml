name: Supabase Keep-Alive
# Supabase Free pausiert ein Projekt nach ~1 Woche Inaktivität.
# Dieser Ping ruft zweimal pro Woche den Auth-Health-Endpoint.

on:
  schedule:
    - cron: '0 6 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -sSf \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/stickers?select=id&limit=1" \
            > /dev/null
